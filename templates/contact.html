<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#4facfe,#00f2fe);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            width:90%;
            max-width:900px;
            background:#fff;
            border-radius:15px;
            display:flex;
            overflow:hidden;
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
        }

        .left{
            width:40%;
            background:#0d6efd;
            color:white;
            padding:40px;
        }

        .left h2{
            margin-bottom:20px;
        }

        .left p{
            margin-bottom:15px;
            line-height:25px;
        }

        .right{
            width:60%;
            padding:40px;
        }

        .right h2{
            margin-bottom:20px;
            color:#333;
        }

        .input-box{
            margin-bottom:20px;
        }

        input, textarea{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }

        textarea{
            resize:none;
            height:120px;
        }

        button{
            width:100%;
            padding:14px;
            background:#0d6efd;
            color:white;
            border:none;
            border-radius:8px;
            font-size:18px;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            background:#084298;
        }

        @media(max-width:768px){

            .container{
                flex-direction:column;
            }

            .left,
            .right{
                width:100%;
            }

        }
    </style>
</head>

<body>

<div class="container">

    <div class="left">
        <h2>Contact Information</h2>

        <p>📍 Bilaspur, Chhattisgarh</p>

        <p>📞 +91 9329957687  (Jitesh)</p>
        <p>📞 +91 9131303515  (Ravi)</p>

        <p>📧 fitnessai@gmail.com</p>

        <p>
            Feel free to contact us for any queries regarding
            Fitness AI App.
        </p>
    </div>

    <div class="right">

        <h2>Contact Us</h2>

        <form>

            <div class="input-box">
                <input type="text" placeholder="Your Name" required>
            </div>

            <div class="input-box">
                <input type="email" placeholder="Your Email" required>
            </div>

            <div class="input-box">
                <input type="text" placeholder="Subject" required>
            </div>

            <div class="input-box">
                <textarea placeholder="Write your message..." required></textarea>
            </div>

            <button type="submit">Send Message</button>

        </form>

    </div>

</div>

</body>
</html>
